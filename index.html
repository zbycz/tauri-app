<!doctype html>
<html lang="en">
  <head>
    <meta charset='utf-8'>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tauri maplibre</title>
    <style>
      :root {
        --bg-color: #f6f6f6;  /*Must be a neutral "paper" color, because safari extends it below keyboard, and above top part of page*/
        --text-color: #1a1a1a;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #121212;
          --text-color: #f0f0f0;
        }
      }

      :root {
        --safe-top: env(safe-area-inset-top);
        --safe-bottom: env(safe-area-inset-bottom);
        --safe-right: env(safe-area-inset-right);
        --safe-left: env(safe-area-inset-left);
      }

      html, body{
        margin: 0;
        padding: 0;
        touch-action: none;
      }

      html {
        height: calc(100% + var(--safe-top) + var(--safe-bottom));
        overscroll-behavior: none;

        background-color: var(--bg-color);
        color: var(--text-color);
        transition: background-color 0.3s ease;
      }

      body, #root {
        height: 100%;
        overflow: hidden;
      }


      body {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
      }

      #map {
        position: absolute;
        top: 0; left: 0;
        right: 0; bottom: 0;
        /*background: #f60;*/
      }

      .maplibregl-ctrl-top-right {
        margin-top: var(--safe-top);
      }

      /* user-select */
      html, body {
        -webkit-user-select: none; /* Safari */
        user-select: none; /* Standard */
        -webkit-touch-callout: none; /* Prevent long-press menu on iOS */
      }

      #root {
        -webkit-user-select: all;
        user-select: all;
        -webkit-touch-callout: default; /* TODO test this properly */
      }

      #panel {
        position: absolute;
        top: 100px;
        left: 10px;
        bottom: 10px;
        right: 10px;
        z-index: 1;
        overflow: auto;

        background-color: var(--bg-color);
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <div id="map"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
